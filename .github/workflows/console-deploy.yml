name: Deploy Console

on:
  push:
    branches:
      - main
    paths:
      - 'applications/console/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: applications/console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: applications/console

      - name: Build
        run: npm run build
        working-directory: applications/console
        env:
          VITE_API_URL: https://api.fabrick.me

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CONSOLE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: applications/console/dist
          skip_app_build: true
          output_location: ""
