name: CD Proposal Promote

on:
  pull_request:
    branches: [develop]
    types: [closed]

jobs:
  promote:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'proposal/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
      - name: Create implementation branch
        run: |
          NAME="${{ github.event.pull_request.head.ref }}"
          NAME="${NAME#proposal/}"
          git checkout -b "implementation/$NAME"
          git push origin "implementation/$NAME"
      - name: Trigger implementation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NAME="${{ github.event.pull_request.head.ref }}"
          NAME="${NAME#proposal/}"
          gh workflow run ci-implementation.yml \
            --ref "implementation/$NAME" \
            --repo "$GITHUB_REPOSITORY"
