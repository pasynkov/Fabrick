name: CI E2E Tests

on:
  push:
    branches: ['release/**']

jobs:
  e2e-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fabrick_test
          POSTGRES_USER: fabrick
          POSTGRES_PASSWORD: ${{ secrets.DB_PASS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --legacy-peer-deps
        working-directory: applications/backend/api
      - run: npm run test:e2e
        working-directory: applications/backend/api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: fabrick
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_TEST_NAME: fabrick_test
          DB_SSL: 'false'
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
