name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - 'applications/backend/api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: applications/backend/api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: applications/backend/api

      - name: Build
        run: npm run build
        working-directory: applications/backend/api

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: func azure functionapp publish ${{ secrets.AZURE_FUNCTIONAPP_NAME }} --javascript
        working-directory: applications/backend/api
