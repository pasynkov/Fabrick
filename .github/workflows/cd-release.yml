name: CD Release

on:
  push:
    branches: ['release/**']
  workflow_dispatch:

jobs:
  e2e-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fabrick_test
          POSTGRES_USER: fabrick
          POSTGRES_PASSWORD: ${{ secrets.DB_PASS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --legacy-peer-deps
        working-directory: applications/backend/api
      - run: npm run test:e2e
        working-directory: applications/backend/api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: fabrick
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_TEST_NAME: fabrick_test
          DB_SSL: 'false'
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  e2e-cli:
    needs: [e2e-api]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fabrick_test
          POSTGRES_USER: fabrick
          POSTGRES_PASSWORD: ci-test-pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite
        ports:
          - 10000:10000
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: fabrick
      DB_PASS: ci-test-pass
      DB_NAME: fabrick_test
      DB_SSL: 'false'
      JWT_SECRET: ci-test-secret-not-for-prod
      AZURE_STORAGE_CONNECTION_STRING: 'DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;'
      FABRICK_API_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Start NATS with JetStream
        run: docker run -d -p 4222:4222 nats:2-alpine -js
      - name: Build API
        run: npm ci --legacy-peer-deps && npm run build
        working-directory: applications/backend/api
      - name: Start API
        run: npm run start &
        working-directory: applications/backend/api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: fabrick
          DB_PASS: ci-test-pass
          DB_NAME: fabrick_test
          DB_SSL: 'false'
          JWT_SECRET: ci-test-secret-not-for-prod
          AZURE_STORAGE_CONNECTION_STRING: 'DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;'
      - name: Wait for services
        run: npx wait-on tcp:10000 http://localhost:3000/health --timeout 60000
      - name: Build CLI
        run: npm ci && npm run build
        working-directory: applications/cli
      - name: Build MCP
        run: npm ci && npm run build
        working-directory: applications/mcp
      - name: Run CLI e2e tests
        run: npm run test:e2e
        working-directory: applications/cli
        env:
          MCP_DIST_PATH: ${{ github.workspace }}/applications/mcp/dist/index.js

  approve:
    needs: [e2e-api, e2e-cli]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Deployment approved"

  version-bump:
    needs: [approve]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Bump package versions
        run: |
          for dir in applications/backend/api applications/backend/synthesis applications/console applications/landing applications/cli applications/mcp; do
            npm --prefix "$dir" version "${{ steps.extract.outputs.version }}" --no-git-tag-version --allow-same-version
          done
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            applications/backend/api/package.json \
            applications/backend/synthesis/package.json \
            applications/console/package.json \
            applications/landing/package.json \
            applications/cli/package.json \
            applications/mcp/package.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.extract.outputs.version }}"
          git push

  deploy-api:
    needs: [version-bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --legacy-peer-deps
        working-directory: applications/backend/api
      - run: npm run build
        working-directory: applications/backend/api
      - run: npm prune --omit=dev --legacy-peer-deps
        working-directory: applications/backend/api
      - name: Package (include dist, bypass .gitignore)
        run: |
          cd applications/backend/api
          zip -r /tmp/api-deploy.zip . \
            -x "*.ts" \
            -x "src/*" \
            -x "test/*" \
            -x ".git*" \
            -x "local.settings.json" \
            -x "*.js.map" \
            -x ".vscode/*" \
            -x "tsconfig.json" \
            -x "jest*" \
            -x "Dockerfile"
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Flex Consumption
        run: |
          az functionapp deployment source config-zip \
            --resource-group fabrick-prod \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
            --src /tmp/api-deploy.zip

  deploy-synthesis:
    needs: [version-bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name ${{ secrets.REGISTRY_LOGIN_SERVER }}
      - name: Build and push synthesis image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/synthesis:${{ needs.version-bump.outputs.version }} \
            applications/backend/synthesis
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/synthesis:${{ needs.version-bump.outputs.version }}
        env:
          DOCKER_BUILDKIT: 1
      - name: Update Container App
        run: |
          az containerapp update \
            --name fabrick-synthesis \
            --resource-group fabrick-prod \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/synthesis:${{ needs.version-bump.outputs.version }}

  deploy-console:
    needs: [version-bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: applications/console/package-lock.json
      - run: npm ci
        working-directory: applications/console
      - run: npm run build
        working-directory: applications/console
        env:
          VITE_API_URL: https://api.fabrick.me
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CONSOLE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: applications/console/dist
          skip_app_build: true
          output_location: ""

  deploy-landing:
    needs: [version-bump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: applications/landing/package-lock.json
      - run: npm ci
        working-directory: applications/landing
      - run: npm run build
        working-directory: applications/landing
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: applications/landing/dist
          skip_app_build: true
          output_location: ""

  publish-npm:
    needs: [version-bump]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [cli, mcp]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: applications/${{ matrix.package }}/package-lock.json
      - run: npm ci
        working-directory: applications/${{ matrix.package }}
      - run: npm run build
        working-directory: applications/${{ matrix.package }}
      - name: Publish to npm (skip if already published)
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "${PKG_NAME}@${VERSION} already published, skipping"
          else
            npm publish --access public
          fi
        working-directory: applications/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

  validate-versions:
    needs: [version-bump, deploy-api, deploy-console, deploy-landing]
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployed versions
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          echo "Expected version: $VERSION"

          check_version() {
            local app="$1"
            local url="$2"
            local field="$3"
            for attempt in 1 2 3; do
              actual=$(curl -sf --max-time 10 "$url" | jq -r ".$field" 2>/dev/null || true)
              if [ "$actual" = "$VERSION" ]; then
                echo "$app: ok ($actual)"
                return 0
              fi
              echo "$app: attempt $attempt failed (got '$actual', expected '$VERSION')"
              [ $attempt -lt 3 ] && sleep 10
            done
            echo "$app version mismatch (expected $VERSION, got $actual)"
            return 1
          }

          failed=0
          check_version "api"     "https://api.fabrick.me/health"      "version" || failed=1
          check_version "console" "https://console.fabrick.me/health.json" "version" || failed=1
          check_version "landing" "https://fabrick.me/health.json"         "version" || failed=1

          exit $failed

  open-pr-to-main:
    needs: [validate-versions, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Open PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH" \
            --title "release: ${BRANCH#release/}" \
            --body "Automated release PR from \`$BRANCH\`. All deploy jobs passed."
