name: CD Proposal Create

on:
  issues:
    types: [labeled]

jobs:
  create:
    if: github.event.label.name == 'proposal:ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch issue thread
        id: thread
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          THREAD=$(gh issue view ${{ github.event.issue.number }} \
            --json title,body,comments \
            --repo "$GITHUB_REPOSITORY")
          echo "thread<<EOF" >> $GITHUB_OUTPUT
          echo "$THREAD" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install openspec
        run: npm install -g @fission-ai/openspec

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate proposal artifacts
        uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-haiku-4-5-20251001
          allowed_tools: "Bash,Read,Write,Glob,LS,Skill"
          prompt: |
            You are generating an OpenSpec proposal from a GitHub issue.

            Full issue thread (JSON):
            ${{ steps.thread.outputs.thread }}

            Issue number: ${{ github.event.issue.number }}

            Steps:
            1. Read the issue thread and derive a concise kebab-case change name that accurately
               reflects the final agreed scope (not just a slug of the title).
            2. Use the Skill tool to invoke the "openspec-propose" skill with that name as the argument.
               This will generate proposal.md, design.md, specs/, and tasks.md artifacts.
            3. Write ONLY the change name (e.g. "persistent-refresh-token") to /tmp/change-name.txt.
               Do NOT include the issue number or "proposal/" prefix.

      - name: Commit and push proposal branch
        id: push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGE_NAME=$(cat /tmp/change-name.txt | tr -d '[:space:]')
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BRANCH_NAME="${ISSUE_NUMBER}-${CHANGE_NAME}"
          git checkout -b "proposal/${BRANCH_NAME}"
          git add openspec/changes/${CHANGE_NAME}/
          git commit -m "proposal: ${CHANGE_NAME}

          refs #${ISSUE_NUMBER}"
          git push origin "proposal/${BRANCH_NAME}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "change_name=${CHANGE_NAME}" >> $GITHUB_OUTPUT

      - name: Post branch created comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Proposal branch created: \`proposal/${{ steps.push.outputs.branch_name }}\`. Review workflow starting." \
            --repo "$GITHUB_REPOSITORY"

      - name: Trigger proposal review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci-proposal-review.yml \
            --ref "proposal/${{ steps.push.outputs.branch_name }}" \
            --field "branch=proposal/${{ steps.push.outputs.branch_name }}" \
            --repo "$GITHUB_REPOSITORY"
