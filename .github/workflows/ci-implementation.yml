name: CI Implementation

on:
  push:
    branches: ['implementation/**']
  workflow_dispatch:

jobs:
  apply-and-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      issues: write
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: fabrick
      DB_PASS: ${{ secrets.DB_PASS }}
      DB_TEST_NAME: fabrick_test
      DB_SSL: 'false'
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fabrick_test
          POSTGRES_USER: fabrick
          POSTGRES_PASSWORD: ${{ secrets.DB_PASS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Extract change name
        id: name
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          FULL_NAME="${BRANCH#implementation/}"
          NAME="$FULL_NAME"
          ISSUE=$(echo "$FULL_NAME" | grep -oE '^[0-9]+' || true)
          # Strip leading issue-id prefix (e.g. "47-foo" -> "foo") if exact dir not found
          if [ ! -d "openspec/changes/$NAME" ]; then
            NAME_NO_ID=$(echo "$NAME" | sed 's/^[0-9]*-//')
            if [ -d "openspec/changes/$NAME_NO_ID" ]; then
              NAME="$NAME_NO_ID"
            fi
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
          echo "full_name=$FULL_NAME" >> $GITHUB_OUTPUT
      - name: Check if change exists
        id: check
        run: |
          if [ -d "openspec/changes/${{ steps.name.outputs.name }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Label issue implementation:apply
        if: steps.name.outputs.issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ steps.name.outputs.issue }}" \
            --add-label "implementation:apply" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
      - name: Check which stages already done
        id: stages
        if: steps.check.outputs.exists == 'true'
        run: |
          NAME="${{ steps.name.outputs.name }}"
          git log --oneline | grep -qF "feat: apply $NAME"       && echo "apply_done=true"      >> $GITHUB_OUTPUT || echo "apply_done=false"      >> $GITHUB_OUTPUT
          git log --oneline | grep -qF "refactor: simplify $NAME" && echo "simplify_done=true"   >> $GITHUB_OUTPUT || echo "simplify_done=false"   >> $GITHUB_OUTPUT
          git log --oneline | grep -qF "fix: review fixes for $NAME" && echo "review_done=true"  >> $GITHUB_OUTPUT || echo "review_done=false"  >> $GITHUB_OUTPUT
      - name: Install openspec
        if: steps.check.outputs.exists == 'true'
        run: npm install -g @fission-ai/openspec
      - name: Install API dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci --legacy-peer-deps
        working-directory: applications/backend/api
      - name: Build apply prompt
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.apply_done == 'false'
        run: |
          NAME="${{ steps.name.outputs.name }}"
          SKILL=".claude/skills/openspec-apply-change/SKILL.md"
          # Strip YAML frontmatter (between first and second ---)
          CONTENT=$(awk 'BEGIN{i=0} /^---$/{i++; next} i>=2{print}' "$SKILL")
          cat > /tmp/apply-prompt.txt << PROMPT
          Change name: $NAME

          $CONTENT

          Additional constraints:
          - Stay on the current branch. Do NOT create or switch branches.
          - Do NOT run any git commands.
          - Do NOT modify any files under \`.github/workflows/\` — skip those tasks.
          - Best effort: implement as many tasks as possible, skip only if truly blocked.
          - After implementation, run: cd applications/backend/api && npm run test:e2e
          - If tests fail, fix the code (including test files if needed) until all tests pass.
          PROMPT
      - name: Apply OpenSpec change
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.apply_done == 'false'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob"
          timeout_minutes: 30
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/apply-prompt.txt
      - name: Commit apply
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.apply_done == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: apply ${{ steps.name.outputs.name }}"
      - name: Build simplify prompt
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.simplify_done == 'false'
        run: |
          SKILL=".claude/skills/simplify/SKILL.md"
          CONTENT=$(awk 'BEGIN{i=0} /^---$/{i++; next} i>=2{print}' "$SKILL")
          cat > /tmp/simplify-prompt.txt << PROMPT
          $CONTENT

          Additional constraints:
          - Non-interactive CI environment. Do NOT use AskUserQuestion tool.
          - Do NOT modify any files under .github/workflows/
          - Do NOT modify test files (*.spec.ts, *.test.ts, *.e2e.ts, **/test/**)
          - Stay on current branch. Do NOT run git commands.
          - After simplifying, run: cd applications/backend/api && npm run test:e2e
          - If tests fail, fix implementation code only. Do NOT modify test files.
          PROMPT
      - name: Simplify changed files
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.simplify_done == 'false'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob"
          timeout_minutes: 30
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/simplify-prompt.txt
      - name: Commit simplify
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.simplify_done == 'false'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "refactor: simplify ${{ steps.name.outputs.name }}"
      - name: Build review prompt
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.review_done == 'false'
        run: |
          SKILL=".claude/skills/review/SKILL.md"
          CONTENT=$(awk 'BEGIN{i=0} /^---$/{i++; next} i>=2{print}' "$SKILL")
          cat > /tmp/review-prompt.txt << PROMPT
          $CONTENT

          Additional constraints:
          - Non-interactive CI environment. Do NOT use AskUserQuestion tool.
          - Do NOT modify any files under .github/workflows/
          - Do NOT modify test files (*.spec.ts, *.test.ts, *.e2e.ts, **/test/**)
          - Stay on current branch. Do NOT run git commands.
          PROMPT
      - name: Review changed files
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.review_done == 'false'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob"
          timeout_minutes: 30
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/review-prompt.txt
      - name: Build review-fix prompt
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.review_done == 'false'
        run: |
          SKILL=".claude/skills/review-fix/SKILL.md"
          CONTENT=$(awk 'BEGIN{i=0} /^---$/{i++; next} i>=2{print}' "$SKILL")
          cat > /tmp/review-fix-prompt.txt << PROMPT
          $CONTENT

          Additional constraints:
          - Non-interactive CI environment. Do NOT use AskUserQuestion tool.
          - Do NOT modify any files under .github/workflows/
          - Do NOT modify test files (*.spec.ts, *.test.ts, *.e2e.ts, **/test/**)
          - Stay on current branch. Do NOT run git commands.
          - After applying fixes, run: cd applications/backend/api && npm run test:e2e
          - If tests fail, fix implementation code only. Do NOT modify test files.
          PROMPT
      - name: Apply review fixes
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.review_done == 'false'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob"
          timeout_minutes: 30
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/review-fix-prompt.txt
      - name: Commit review-fix
        if: steps.check.outputs.exists == 'true' && steps.stages.outputs.review_done == 'false'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "fix: review fixes for ${{ steps.name.outputs.name }}"
      - name: Install app dependencies for build check
        if: steps.check.outputs.exists == 'true'
        run: |
          npm ci --legacy-peer-deps
        working-directory: applications/backend/api
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '24'
      - name: Install synthesis dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm install
        working-directory: applications/backend/synthesis
      - name: Install console dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
        working-directory: applications/console
      - name: Install cli dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
        working-directory: applications/cli
      - name: Install mcp dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
        working-directory: applications/mcp
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: '22'
      - name: Install landing dependencies
        if: steps.check.outputs.exists == 'true'
        run: npm ci
        working-directory: applications/landing
      - name: Build all apps — collect results
        if: steps.check.outputs.exists == 'true'
        id: build_check
        run: |
          RESULTS=""
          FAILED=0

          run_build() {
            local name="$1"
            local dir="$2"
            local extra_env="$3"
            echo "--- Building $name ---"
            output=$(cd "$dir" && env $extra_env npm run build 2>&1) && code=0 || code=$?
            if [ $code -ne 0 ]; then
              FAILED=1
              RESULTS="${RESULTS}\n\n=== FAILED: $name ===\nDir: $dir\n${output}"
            else
              echo "$name: OK"
            fi
          }

          run_build "backend/api"       "applications/backend/api"       ""
          run_build "backend/synthesis" "applications/backend/synthesis"  ""
          run_build "console"           "applications/console"            "VITE_API_URL=https://api.fabrick.me"
          run_build "landing"           "applications/landing"            ""
          run_build "cli"               "applications/cli"                ""
          run_build "mcp"               "applications/mcp"                ""

          if [ $FAILED -eq 1 ]; then
            printf "%b" "$RESULTS" > /tmp/build-failures.txt
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi
      - name: Build build-fix prompt
        if: steps.check.outputs.exists == 'true' && steps.build_check.outputs.failed == 'true'
        run: |
          cat > /tmp/build-fix-prompt.txt << 'PROMPT'
          Some application builds failed. Fix the source code so all builds pass.

          Failed builds and their error output:
          PROMPT
          cat /tmp/build-failures.txt >> /tmp/build-fix-prompt.txt
          cat >> /tmp/build-fix-prompt.txt << 'PROMPT'

          Instructions:
          - Fix source code only. Do NOT modify package.json, tsconfig.json, or build config files.
          - Do NOT modify files under .github/workflows/
          - Do NOT modify test files (*.spec.ts, *.test.ts, *.e2e.ts, **/test/**)
          - Do NOT run git commands.
          - After fixing, verify by running the failed builds again:
            - applications/backend/api: cd applications/backend/api && npm run build
            - applications/backend/synthesis: cd applications/backend/synthesis && npm run build
            - applications/console: cd applications/console && VITE_API_URL=https://api.fabrick.me npm run build
            - applications/landing: cd applications/landing && npm run build
            - applications/cli: cd applications/cli && npm run build
            - applications/mcp: cd applications/mcp && npm run build
          - Only re-run the builds that were failing.
          - All previously failing builds must pass before you are done.
          PROMPT
      - name: Fix build failures
        if: steps.check.outputs.exists == 'true' && steps.build_check.outputs.failed == 'true'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          #anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob"
          timeout_minutes: 30
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/build-fix-prompt.txt
      - name: Commit build fixes
        if: steps.check.outputs.exists == 'true' && steps.build_check.outputs.failed == 'true'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "fix: build failures for ${{ steps.name.outputs.name }}"
      - name: Build archive prompt
        if: steps.check.outputs.exists == 'true'
        run: |
          NAME="${{ steps.name.outputs.name }}"
          SKILL=".claude/skills/openspec-archive-change/SKILL.md"
          CONTENT=$(awk 'BEGIN{i=0} /^---$/{i++; next} i>=2{print}' "$SKILL")
          cat > /tmp/archive-prompt.txt << PROMPT
          Change name: $NAME

          $CONTENT

          Additional constraints:
          - Do NOT run any git commands. Only perform the file operations.
          - This is a non-interactive CI environment. Do NOT use AskUserQuestion tool.
          - Skip all interactive confirmations — proceed automatically with archive.
          - Skip delta spec sync (do NOT sync specs, just archive the change directory).
          - If tasks or artifacts are incomplete, proceed anyway without prompting.
          PROMPT
      - name: Archive OpenSpec change
        if: steps.check.outputs.exists == 'true'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#          anthropic_api_key: ${{ secrets.CLAUDE_CODE_API_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob"
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/archive-prompt.txt
      - name: Commit
        if: steps.check.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: archive ${{ steps.name.outputs.name }}"
          git push

  promote:
    needs: [apply-and-archive]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Promote to feature branch
        id: promote
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          FULL_NAME="${BRANCH#implementation/}"
          ISSUE=$(echo "$FULL_NAME" | grep -oE '^[0-9]+' || true)
          git pull origin "$BRANCH"
          git checkout -b "feature/$FULL_NAME"
          git push origin "feature/$FULL_NAME"
          git push origin --delete "$BRANCH"
          echo "full_name=$FULL_NAME" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT
      - name: Open PR to develop
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FULL_NAME="${{ steps.promote.outputs.full_name }}"
          ISSUE="${{ steps.promote.outputs.issue }}"
          BRANCH="feature/$FULL_NAME"
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --base develop --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            BODY=$(printf "Implementation complete.\n\nRelated: #%s" "$ISSUE")
            PR_URL=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base develop \
              --head "$BRANCH" \
              --title "$FULL_NAME" \
              --body "$BODY")
          else
            PR_URL=$(gh pr view "$existing" --repo "$GITHUB_REPOSITORY" --json url --jq '.url')
          fi
          echo "url=$PR_URL" >> $GITHUB_OUTPUT
      - name: Update issue labels
        if: steps.promote.outputs.issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ steps.promote.outputs.issue }}" \
            --remove-label "implementation:apply" \
            --add-label "implementation:ready" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
      - name: Comment on issue
        if: steps.promote.outputs.issue != '' && steps.pr.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.promote.outputs.issue }}" \
            --body "Implementation complete. PR opened to develop: ${{ steps.pr.outputs.url }}" \
            --repo "$GITHUB_REPOSITORY"
