services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fabrick
      POSTGRES_USER: fabrick
      POSTGRES_PASSWORD: fabrick
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabrick"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: api
    ports:
      - "3000:3000"
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fabrick
      DB_USER: fabrick
      DB_PASS: fabrick
      JWT_SECRET: change-me-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  mcp:
    build: mcp
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fabrick
      DB_USER: fabrick
      DB_PASS: fabrick
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
