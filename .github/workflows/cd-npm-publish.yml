name: CD Publish npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - cli
          - mcp
          - both
      version_bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ inputs.package }}" = "both" ]; then
            echo 'matrix=["cli","mcp"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ inputs.package }}"]' >> $GITHUB_OUTPUT
          fi

  publish:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.setup.outputs.matrix) }}
    concurrency:
      group: npm-publish-${{ matrix.package }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: applications/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: applications/${{ matrix.package }}

      - name: Build
        run: npm run build
        working-directory: applications/${{ matrix.package }}

      - name: Bump version
        run: npm version ${{ inputs.version_bump }} --no-git-tag-version
        working-directory: applications/${{ matrix.package }}

      - name: Commit and push version bump
        run: |
          NEW_VERSION=$(node -p "require('./applications/${{ matrix.package }}/package.json').version")
          git add applications/${{ matrix.package }}/package.json
          git commit -m "chore(release): bump @fabrick/${{ matrix.package }} to ${NEW_VERSION}"
          git push origin HEAD:refs/heads/${{ github.ref_name }}

      - name: Publish to npm
        run: npm publish
        working-directory: applications/${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
