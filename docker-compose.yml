services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fabrick
      POSTGRES_PASSWORD: fabrick
      POSTGRES_DB: fabrick
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabrick"]
      interval: 5s
      timeout: 5s
      retries: 5
