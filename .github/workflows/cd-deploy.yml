name: CD Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci --legacy-peer-deps
        working-directory: applications/backend/api
      - run: npm run build
        working-directory: applications/backend/api
      - run: npm prune --omit=dev --legacy-peer-deps
        working-directory: applications/backend/api
      - name: Create deployment zip with node_modules
        run: |
          cd applications/backend/api
          zip -r /tmp/api.zip . \
            --exclude "*.ts" \
            --exclude "src/*" \
            --exclude "test/*" \
            --exclude ".git*" \
            --exclude "*.js.map" \
            --exclude "tsconfig*" \
            --exclude "local.settings.json" \
            -q
          echo "Zip size: $(du -sh /tmp/api.zip | cut -f1)"
      - name: Deploy via Kudu zip API
        run: |
          CREDS=$(echo '${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}' | \
            python3 -c "
          import sys, xml.etree.ElementTree as ET
          tree = ET.parse(sys.stdin)
          root = tree.getroot()
          for p in root.iter('publishProfile'):
              if p.get('publishMethod') == 'ZipDeploy':
                  print(p.get('userName') + ':' + p.get('userPWD'))
                  break
          ")
          curl -X POST \
            "https://${{ secrets.AZURE_FUNCTION_APP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
            -u "$CREDS" \
            --data-binary @/tmp/api.zip \
            -H "Content-Type: application/zip" \
            -w "\nHTTP %{http_code}" \
            --max-time 120

  deploy-synthesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Login to ACR
        run: az acr login --name ${{ secrets.REGISTRY_LOGIN_SERVER }}
      - name: Build and push synthesis image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/synthesis:${{ github.sha }} \
            applications/backend/synthesis
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/synthesis:${{ github.sha }}
        env:
          DOCKER_BUILDKIT: 1
      - name: Update Container App
        run: |
          az containerapp update \
            --name fabrick-synthesis \
            --resource-group fabrick-prod \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/synthesis:${{ github.sha }}

  deploy-console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: applications/console/package-lock.json
      - run: npm ci
        working-directory: applications/console
      - run: npm run build
        working-directory: applications/console
        env:
          VITE_API_URL: https://api.fabrick.me
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CONSOLE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: applications/console/dist
          skip_app_build: true
          output_location: ""

  deploy-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: applications/landing/package-lock.json
      - run: npm ci
        working-directory: applications/landing
      - run: npm run build
        working-directory: applications/landing
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: applications/landing/dist
          skip_app_build: true
          output_location: ""
