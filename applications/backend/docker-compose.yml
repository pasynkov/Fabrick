services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fabrick
      POSTGRES_USER: fabrick
      POSTGRES_PASSWORD: fabrick
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabrick"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2-alpine
    command: -js -sd /data
    ports:
      - "4222:4222"
    volumes:
      - nats_data:/data

  api:
    build: api
    ports:
      - "3000:3000"
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fabrick
      DB_USER: fabrick
      DB_PASS: fabrick
      JWT_SECRET: change-me-in-production
      QUEUE_DRIVER: nats
      NATS_URL: nats://nats:4222
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  synthesis:
    build: synthesis
    environment:
      QUEUE_DRIVER: nats
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_BASE_URL: http://api:3000
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  minio_data:
  postgres_data:
  nats_data:
