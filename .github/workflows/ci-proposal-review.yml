name: AI Proposal Review

on:
  push:
    branches: ['proposal/**']
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to review (e.g. proposal/my-change)'
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract change name and issue number
        id: meta
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          BRANCH_SUFFIX="${BRANCH#proposal/}"
          ISSUE="${BRANCH_SUFFIX%%-*}"
          NAME="${BRANCH_SUFFIX#*-}"
          if ! echo "$ISSUE" | grep -qE '^[0-9]+$'; then
            ISSUE=""
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT

      - name: Install openspec
        run: npm install -g @fission-ai/openspec

      - name: Build review-proposal prompt
        run: |
          NAME="${{ steps.meta.outputs.name }}"
          ISSUE="${{ steps.meta.outputs.issue }}"
          SKILL=".claude/skills/review-proposal/SKILL.md"
          CONTENT=$(cat "$SKILL")
          cat > /tmp/review-proposal-prompt.txt << PROMPT
          Change name: $NAME
          Issue number: $ISSUE
          GITHUB_REPOSITORY: ${{ github.repository }}

          $CONTENT

          Additional constraints:
          - Non-interactive CI environment. Do NOT use AskUserQuestion tool.
          - Write the full report to /tmp/review-report.md (step 9 of the skill).
          - Use Edit tool to fix discrepancies in openspec/ files (step 7 of the skill).
          - Stay on current branch. Do NOT run git commands.
          PROMPT

      - name: Review proposal
        uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,LS"
          timeout_minutes: 15
          settings: |
            {
              "permissions": {
                "allow": ["Bash(*)", "Read(*)", "Write(*)", "Edit(*)", "Glob(*)"],
                "deny": []
              }
            }
          prompt_file: /tmp/review-proposal-prompt.txt

      - name: Commit spec fixes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openspec/
          if ! git diff --staged --quiet; then
            git commit -m "fix(proposal): align spec with issue #${{ steps.meta.outputs.issue }}"
            git push
          fi

      - name: Open PR to develop
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          ISSUE="${{ steps.meta.outputs.issue }}"
          NAME="${{ steps.meta.outputs.name }}"
          existing=$(gh pr list --repo "$GITHUB_REPOSITORY" --base develop --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            BODY=$(printf "AI review passed. Ready to merge into develop.\n\nRelated: #%s" "$ISSUE")
            PR_URL=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base develop \
              --head "$BRANCH" \
              --title "proposal: $NAME" \
              --body "$BODY")
          else
            PR_URL=$(gh pr view "$existing" --repo "$GITHUB_REPOSITORY" --json url --jq '.url')
          fi
          echo "url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Remove proposal labels from issue
        if: steps.meta.outputs.issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit "${{ steps.meta.outputs.issue }}" \
            --remove-label "proposal:ready" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh issue edit "${{ steps.meta.outputs.issue }}" \
            --remove-label "proposal:exploring" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

      - name: Comment on issue with PR link and review report
        if: steps.meta.outputs.issue != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL="${{ steps.pr.outputs.url }}"
          REPORT=""
          if [ -f /tmp/review-report.md ]; then
            REPORT=$(cat /tmp/review-report.md)
          fi
          BODY=$(printf "Proposal reviewed. PR opened: %s\n\n%s" "$PR_URL" "$REPORT")
          gh issue comment "${{ steps.meta.outputs.issue }}" \
            --body "$BODY" \
            --repo "$GITHUB_REPOSITORY"
