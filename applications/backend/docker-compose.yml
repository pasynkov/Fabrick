services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fabrick
      POSTGRES_USER: fabrick
      POSTGRES_PASSWORD: fabrick
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fabrick"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"

  nats:
    image: nats:2-alpine
    command: -js -sd /data
    ports:
      - "4222:4222"
    volumes:
      - nats_data:/data

  api:
    build: api
    ports:
      - "3000:3000"
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fabrick
      DB_USER: fabrick
      DB_PASS: fabrick
      JWT_SECRET: change-me-in-production
      QUEUE_DRIVER: nats
      NATS_URL: nats://nats:4222
    depends_on:
      azurite:
        condition: service_started
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  synthesis:
    build: synthesis
    environment:
      QUEUE_DRIVER: nats
      NATS_URL: nats://nats:4222
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      API_BASE_URL: http://api:3000
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started

volumes:
  postgres_data:
  nats_data:
