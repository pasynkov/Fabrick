name: Deploy Landing

on:
  push:
    branches:
      - main
    paths:
      - 'applications/landing/app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: applications/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: applications

      - name: Build
        run: npm exec nx build landing
        working-directory: applications

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: applications/landing/app/dist
          skip_app_build: true
          output_location: ""
