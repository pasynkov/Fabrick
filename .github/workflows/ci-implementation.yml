name: CI Implementation

on:
  push:
    branches: ['implementation/**']
  workflow_dispatch:

jobs:
  apply-and-archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Extract change name
        id: name
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          NAME="${BRANCH#implementation/}"
          echo "name=$NAME" >> $GITHUB_OUTPUT
      - name: Check if change exists
        id: check
        run: |
          if [ -d "openspec/changes/${{ steps.name.outputs.name }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Install openspec
        if: steps.check.outputs.exists == 'true'
        run: npm install -g @fission-ai/openspec
      - name: Apply OpenSpec change
        if: steps.check.outputs.exists == 'true'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Skill"
          prompt: |
            Use the Skill tool to invoke the "openspec-apply-change" skill
            with args "${{ steps.name.outputs.name }}".
            Important:
            - Stay on the current branch. Do NOT create or switch branches.
            - Do NOT run any git commands.
            - Do NOT modify any files under `.github/workflows/` — skip those tasks.
            - Best effort: implement as many tasks as possible, skip only if truly blocked.
      - name: Archive OpenSpec change
        if: steps.check.outputs.exists == 'true'
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Write,Edit,Glob,Skill"
          prompt: |
            Use the Skill tool to invoke the "openspec-archive-change" skill
            with args "${{ steps.name.outputs.name }}".
            Do NOT run any git commands. Only perform the file operations.
      - name: Commit
        if: steps.check.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: implement and archive ${{ steps.name.outputs.name }}"
          git push

  promote:
    needs: [apply-and-archive]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
      - name: Promote to feature branch
        id: promote
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          NAME="${BRANCH#implementation/}"
          git pull origin "$BRANCH"
          git checkout -b "feature/$NAME"
          git push origin "feature/$NAME"
          git push origin --delete "$BRANCH"
          echo "name=$NAME" >> $GITHUB_OUTPUT
      - name: Trigger unit tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ci-unit.yml --ref "feature/${{ steps.promote.outputs.name }}"
